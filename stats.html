<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حالة المنصة - AI Dream Weaver</title>
    <meta name="description" content="حالة منصة تفسير الأحلام بالذكاء الاصطناعي">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Tajawal',sans-serif;background:#050210;color:#e2d9f3;min-height:100vh;line-height:1.6;}
        .bg{position:fixed;inset:0;z-index:-2;background:radial-gradient(ellipse at 20% 50%,#1e0a3c 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,#0c0a3e 0%,transparent 50%),#050210;}
        canvas{position:fixed;inset:0;z-index:-1;pointer-events:none;}
        nav{position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:.75rem 2rem;background:rgba(5,2,16,.9);backdrop-filter:blur(12px);border-bottom:1px solid rgba(124,58,237,.4);flex-wrap:wrap;gap:.5rem;}
        .logo{font-size:1.4rem;font-weight:900;display:flex;align-items:center;gap:5px;text-decoration:none;}
        .logo-en{background:linear-gradient(135deg,#f0c060,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
        .logo-ar{color:#a855f7;}.logo-sep{color:#f0c060;}
        .nav-r{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;}
        .nav-r a{color:#e2d9f3;text-decoration:none;font-size:.85rem;transition:color .2s;}
        .nav-r a:hover{color:#f0c060;}
        .nav-cta{background:linear-gradient(135deg,#7c3aed,#ec4899);color:white!important;padding:.4rem 1.1rem;border-radius:50px;font-size:.82rem;font-weight:700;}
        .container{max-width:1000px;margin:0 auto;padding:2rem 1.5rem;}
        h1{font-size:2.5rem;font-weight:900;text-align:center;margin-bottom:.5rem;}
        .gold{color:#f0c060;}.purple{color:#a855f7;}
        .page-hero{text-align:center;padding:3rem 1.5rem 2rem;}
        .page-hero p{color:rgba(226,217,243,.7);font-size:1.1rem;}
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1.5rem;margin:2rem 0;}
        .stat-card{background:rgba(30,10,60,.6);padding:2rem;border-radius:20px;border:1px solid rgba(124,58,237,.4);text-align:center;transition:all .3s;}
        .stat-card:hover{border-color:#a855f7;transform:translateY(-5px);}
        .stat-card .number{font-size:3rem;font-weight:800;color:#f0c060;}
        .stat-card .label{color:#a855f7;font-size:.95rem;margin-top:.5rem;}
        .stat-card .icon{font-size:2.5rem;}
        .status-ok{color:#10b981;}
        .status-error{color:#ef4444;}
        .articles-section{margin-top:3rem;}
        .articles-section h2{color:#f0c060;font-size:1.8rem;margin-bottom:1.5rem;}
        .article-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1.5rem;}
        .article-card{background:rgba(30,10,60,.4);padding:1.5rem;border-radius:15px;border:1px solid rgba(124,58,237,.3);transition:all .3s;text-decoration:none;display:block;}
        .article-card:hover{border-color:#f0c060;transform:translateY(-3px);}
        .article-card h3{color:#f0c060;font-size:1.1rem;margin-bottom:.5rem;line-height:1.4;}
        .article-card .meta{color:#9ca3af;font-size:.85rem;}
        .article-card .cat{color:#a855f7;font-size:.8rem;}
        .empty{text-align:center;padding:3rem;color:#9ca3af;}
        footer{text-align:center;padding:2rem;color:#9ca3af;border-top:1px solid rgba(124,58,237,.3);margin-top:3rem;}
    </style>
</head>
<body>
    <div class="bg"></div>
    <canvas id="stars"></canvas>
    <nav>
        <a href="/" class="logo"><span class="logo-en">Weaver</span><span class="logo-sep">|</span><span class="logo-ar">الحالم</span></a>
        <div class="nav-r">
            <a href="/">الرئيسية</a>
            <a href="/blog.html">المدونة</a>
            <a href="/analyze.html" class="nav-cta">🔮 حلل حلمك</a>
        </div>
    </nav>
    
    <div class="container">
        <div class="page-hero">
            <h1>🤖 <span class="gold">حالة المنصة</span></h1>
            <p>آخر تحديث: <span id="last-update"></span></p>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="icon">📰</div>
                <div class="number" id="articles-count">--</div>
                <div class="label">المقالات</div>
            </div>
            <div class="stat-card">
                <div class="icon">📝</div>
                <div class="number" id="blog-posts">--</div>
                <div class="label">منشورات المدونة</div>
            </div>
            <div class="stat-card">
                <div class="icon">🧬</div>
                <div class="number" id="knowledge-topics">--</div>
                <div class="label">مواضيع المعرفة</div>
            </div>
            <div class="stat-card">
                <div class="icon">🤖</div>
                <div class="number" id="platform-status" class="status-ok">✅</div>
                <div class="label">حالة OpenClaw</div>
            </div>
        </div>
        
        <div class="articles-section">
            <h2>📰 أحدث المقالات</h2>
            <div class="article-grid" id="articles-list">
                <div class="empty">جاري تحميل المقالات...</div>
            </div>
        </div>
    </div>
    
    <footer>
        <p>🤖 AI Dream Weaver - منصة تفسير الأحلام بالذكاء الاصطناعي</p>
        <p>Powered by OpenClaw AI Agent v1.0.0</p>
    </footer>
    
    <script>
    // تحديث الوقت
    document.getElementById('last-update').textContent = new Date().toLocaleString('ar');
    
    // جلب ملفات المدونة
    async function loadStats() {
        try {
            // جلب قائمة الملفات
            const response = await fetch('/blog/metadata.json');
            const metadata = await response.json();
            const articles = Object.keys(metadata).length;
            document.getElementById('articles-count').textContent = articles;
            
            // جلب ملفات HTML
            const htmlCount = await fetch('/blog/').then(r => r.text()).then(html => {
                const matches = html.match(/\.html/g);
                return matches ? matches.length : 0;
            }).catch(() => 0);
            document.getElementById('blog-posts').textContent = htmlCount;
            
            // عدد مواضيع المعرفة (ثابت)
            document.getElementById('knowledge-topics').textContent = '5';
            
            // عرض أحدث المقالات
            const list = document.getElementById('articles-list');
            const articlesList = Object.entries(metadata).slice(0, 6);
            
            if (articlesList.length > 0) {
                list.innerHTML = articlesList.map(([slug, article]) => `
                    <a href="/blog/${slug}.html" class="article-card">
                        <h3>${article.title_ar || article.title_en}</h3>
                        <div class="meta">${article.date || ''}</div>
                        <div class="cat">${article.category || 'تفسير الأحلام'}</div>
                    </a>
                `).join('');
            } else {
                list.innerHTML = '<div class="empty">لا توجد مقالات بعد</div>';
            }
        } catch(e) {
            console.error('Error:', e);
            document.getElementById('platform-status').textContent = '⚠️';
            document.getElementById('articles-list').innerHTML = '<div class="empty">تعذر تحميل البيانات</div>';
        }
    }
    
    loadStats();
    
    // تأثير النجوم
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const stars = Array(100).fill().map(() => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 2,
        opacity: Math.random()
    }));
    function drawStars() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        stars.forEach(star => {
            ctx.fillStyle = `rgba(255,255,255,${star.opacity})`;
            ctx.beginPath();
            ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
            ctx.fill();
        });
        requestAnimationFrame(drawStars);
    }
    drawStars();
    </script>
</body>
</html>
