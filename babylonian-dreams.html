/* ════════════════════════════════════════
   تحديد الصفحة من URL وتعبئة المحتوى
   ════════════════════════════════════════ */
function getPageKey() {
    const path = window.location.pathname;
    const file = path.split('/').pop().replace('.html', '');
    return file || 'snake-dream'; // fallback
}

function buildPage(key) {
    const data = PAGES[key];
    if (!data) {
        document.getElementById('article-title').textContent = 'المقال غير موجود';
        return;
    }

    // HTML title
    const isEn = document.body.classList.contains('en');
    document.getElementById('page-title').textContent =
        (isEn ? data.titleEn : data.titleAr) + ' | Weaver';

    // Header
    document.getElementById('article-badge').textContent = isEn ? data.badgeEn : data.badgeAr;
    document.getElementById('article-title').textContent = isEn ? data.titleEn : data.titleAr;
    document.getElementById('article-meta').textContent = isEn ? data.metaEn : data.metaAr;

    // Content blocks
    document.getElementById('content-ar').innerHTML = data.contentAr;
    document.getElementById('content-en').innerHTML = data.contentEn;
}

/* ════════════════════════════════════════
   تبديل اللغة — يُصلح dir & lang & font
   ════════════════════════════════════════ */
function switchLang(lang) {
    const body = document.body;
    const html = document.documentElement;

    // اللغة والاتجاه
    body.className = lang;
    html.setAttribute('lang', lang);
    html.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');

    // أزرار NAV
    document.getElementById('nav-btn-ar').classList.toggle('on', lang === 'ar');
    document.getElementById('nav-btn-en').classList.toggle('on', lang === 'en');

    // أزرار المقال
    document.getElementById('art-btn-ar').classList.toggle('on', lang === 'ar');
    document.getElementById('art-btn-en').classList.toggle('on', lang === 'en');

    // المحتوى
    document.getElementById('content-ar').classList.toggle('active', lang === 'ar');
    document.getElementById('content-en').classList.toggle('active', lang === 'en');

    // رابط الرجوع
    document.getElementById('back-link').textContent =
        lang === 'ar' ? '← العودة للصفحة الرئيسية' : '→ Back to Home';
    document.getElementById('nav-home-link').textContent =
        lang === 'ar' ? 'الرئيسية' : 'Home';

    // أعد بناء الرأس بالترجمة الصحيحة
    buildPage(getPageKey());

    // حفظ التفضيل
    try { localStorage.setItem('weaver_lang', lang); } catch(e) {}
}

/* ════════════════════════════════════════
   النجوم بالـ canvas
   ════════════════════════════════════════ */
(function initStars() {
    const cv = document.getElementById('star-canvas');
    const ctx = cv.getContext('2d');
    let stars = [];

    function resize() {
        cv.width  = window.innerWidth;
        cv.height = window.innerHeight;
    }

    function spawn() {
        stars = [];
        for (let i = 0; i < 160; i++) {
            stars.push({
                x: Math.random() * cv.width,
                y: Math.random() * cv.height,
                r: Math.random() * 1.5 + 0.3,
                o: Math.random(),
                d: (Math.random() * 0.015 + 0.004) * (Math.random() < .5 ? 1 : -1)
            });
        }
    }

    function draw() {
        ctx.clearRect(0, 0, cv.width, cv.height);
        stars.forEach(s => {
            s.o += s.d;
            if (s.o > 1 || s.o < 0) s.d *= -1;
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255,255,255,${s.o.toFixed(2)})`;
            ctx.fill();
        });
        requestAnimationFrame(draw);
    }

    window.addEventListener('resize', () => { resize(); spawn(); });
    resize(); spawn(); draw();
})();

/* ════════════════════════════════════════
   تهيئة الصفحة
   ════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', function () {
    // استرجاع اللغة المحفوظة
    let savedLang = 'ar';
    try { savedLang = localStorage.getItem('weaver_lang') || 'ar'; } catch(e) {}

    const key = getPageKey();
    buildPage(key);

    if (savedLang === 'en') {
        switchLang('en');
    }
});
</script>
