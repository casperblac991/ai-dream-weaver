name: تحديث المدونة اليومي

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  update-blog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests google-generativeai

      - run: python weaver_complete.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - run: |
          git config user.name "Weaver Bot"
          git config user.email "bot@aidreamweaver.store"
          git add articles/ *.html
          git commit -m "تحديث المدونة" || exit 0
          git push
