name: Weaver Complete Automation v3.0

on:
  schedule:
    - cron: '0 8 * * *'
    - cron: '0 14 * * *'
    - cron: '0 19 * * *'
  workflow_dispatch:

jobs:
  daily-blog:
    name: Daily Blog Generation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests groq schedule
      - name: Generate blog post
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: python automation/weaver_auto_system.py --once
      - name: Commit blog files
        run: |
          git config user.email "weaver-bot@aidreamweaver.store"
          git config user.name "Weaver AI Bot"
          git add blog/ || true
          git diff --staged --quiet || (git commit -m "Auto blog $(date '+%Y-%m-%d')" && git push) || true

  marketing:
    name: Marketing Automation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests schedule
      - name: Run marketing
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: python automation/marketing_bot.py --once
