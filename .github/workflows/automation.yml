# Weaver Complete Automation v3.0
name: Weaver Complete Automation

on:
  schedule:
    - cron: '0 9 * * *'    # 9 AM - moved from 8 AM
    - cron: '0 14 * * *'   # 2 PM
    - cron: '0 19 * * *'  # 7 PM
  workflow_dispatch:

jobs:
  daily-blog:
    name: Daily Blog Generation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests groq schedule beautifulsoup4

      - name: Check secrets and generate blog post
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: |
          echo "Checking GROQ_API_KEY..."
          if [ -z "$GROQ_API_KEY" ]; then
            echo "⚠️ GROQ_API_KEY مفقود - يتخطى التشغيل"
            echo "Note: Add GROQ_API_KEY in https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 0
          fi
          echo "✅ GROQ_API_KEY موجود"
          python automation/weaver_auto_system.py --once || echo "⚠️ فشل التشغيل"

      - name: Commit and push changes
        run: |
          git config user.email "weaver-bot@aidreamweaver.store"
          git config user.name "Weaver AI Bot"
          git add blog/ blog.html || true
          git diff --staged --quiet || (git commit -m "🤖 تحديث تلقائي: مقال جديد $(date '+%Y-%m-%d %H:%M')" && git push) || true
