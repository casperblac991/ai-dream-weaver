Weaver Complete Automation v3.0

on:
  schedule:
    - cron: '0 8 * * *'
    - cron: '10 14 * * *'
    - cron: '0 19 * * *'
  workflow_dispatch:

jobs:
  daily-blog:
    name: Daily Blog Generation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests groq schedule beautifulsoup4

      - name: Generate blog post
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: python automation/weaver_auto_system.py --once

      - name: Commit and push changes
        run: |
          git config user.email "weaver-bot@aidreamweaver.store"
          git config user.name "Weaver AI Bot"
          git add blog/ blog.html || true
          git diff --staged --quiet || (git commit -m "🤖 تحديث تلقائي: مقال جديد $(date '+%Y-%m-%d %H:%M')" && git push) || true
