name: Weaver Daily Blog v3.0

on:
  schedule:
    - cron: '0 11 * * *'  # 11 AM - moved from 8 AM
  workflow_dispatch:

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests groq schedule beautifulsoup4
      - name: Generate blog post
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: python automation/weaver_auto_system.py --once
      - name: Commit blog
        run: |
          git config user.email "weaver-bot@aidreamweaver.store"
          git config user.name "Weaver AI Bot"
          git add blog/ blog.html || true
          git diff --staged --quiet || (git commit -m "🤖 تحديث: مقال $(date '+%Y-%m-%d')" && git push) || true
