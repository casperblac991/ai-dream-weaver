name: Weaver Daily Blog Automation
on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:
jobs:
  daily-blog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
      - name: Run daily blog bot
        run: |
          python daily_blog_bot.py
      - name: Commit and push
        run: |
          git config user.email "weaver-bot@aidreamweaver.store"
          git config user.name "Weaver AI Bot"
          git add articles/ blog/ || true
          git diff --staged --quiet || (git commit -m "📚 نشر تقرير يومي $(date '+%Y-%m-%d')" && git push) || true
