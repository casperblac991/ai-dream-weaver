name: Weaver Daily

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests schedule
      - run: python weaver_automation.py
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
