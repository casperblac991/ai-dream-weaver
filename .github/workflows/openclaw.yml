# OpenClaw AI Agent - GitHub Actions Workflow

name: OpenClaw AI Agent

on:
  schedule:
    - cron: '0 8 * * *'    # 8 AM
    - cron: '0 14 * * *'   # 2 PM
    - cron: '0 19 * * *'   # 7 PM
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  openclaw:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install requests groq schedule beautifulsoup4

      - name: Run OpenClaw Blog Generation
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "🤖 OpenClaw generating blog post..."
          python openclaw.py --once --task blog || true
          echo "Blog generation complete"

      - name: Copy articles to blog folder
        run: |
          cp articles/*.html blog/ 2>/dev/null || true
          echo "Copied articles to blog folder"

      - name: Configure git
        run: |
          git config user.name "OpenClaw Bot"
          git config user.email "bot@ai-dream-weaver.store"

      - name: Commit and push
        run: |
          git add blog/ articles/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🤖 OpenClaw: New content $(date '+%Y-%m-%d %H:%M')" || true
            git push || echo "Push failed, continuing..."
          fi

      - name: Report status
        run: |
          echo "✅ OpenClaw execution completed"
          ls -la blog/*.html 2>/dev/null | wc -l | xargs echo "Articles in blog:"
