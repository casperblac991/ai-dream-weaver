# OpenClaw AI Agent - GitHub Actions Workflow

name: OpenClaw AI Agent

on:
  schedule:
    - cron: '0 8 * * *'    # 8 AM
    - cron: '0 14 * * *'   # 2 PM
    - cron: '0 19 * * *'   # 7 PM
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  openclaw:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: python -m pip install --upgrade pip && pip install requests groq schedule beautifulsoup4
      
      - env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "🤖 OpenClaw running..."
          python openclaw.py --once --task blog || echo "Blog task done"
          python openclaw.py --once --task monitor || echo "Monitor done"

      - run: |
          git config user.name "OpenClaw Bot"
          git config user.email "bot@ai-dream-weaver.store"
          git add articles/ blog/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "🤖 OpenClaw: New content $(date '+%Y-%m-%d %H:%M')" && git push
