name: Sigil - Self-Improving AI Agent

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Instruction for Sigil (optional - if empty, it will self-improve automatically)'
        required: false
        default: ''
  schedule:
    # Run weekly at midnight on Sundays
    - cron: '0 0 * * 0'
  push:
    branches:
      - main
      - master

jobs:
  run-sigil:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Sigil
        run: |
          pip install sigil-py

      - name: Run Sigil Agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT: ${{ github.event.inputs.prompt }}
        run: |
          sigil run "$INPUT" --model gpt-4o

      - name: Create Pull Request if changes
        if: github.event_name == 'workflow_dispatch'
        uses:actions/create-pull-request@v7
        with:
          title: '🤖 Sigil Improvements'
          body: |
            Automated improvements by Sigil AI Agent

            _This PR was created by an AI agent on behalf of the user._
          branch: sigil-improvements
          base: main
          commit-message: '🤖 Sigil auto-improvement'