name: Auto-merge Dependabot PRs

# This workflow uses GitHub's built-in auto-merge feature for Dependabot PRs
# It runs on a schedule to ensure all Dependabot PRs have auto-merge enabled

on:
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    - cron: '*/30 * * * *'  # Check every 30 minutes

permissions:
  contents: read
  pull-requests: write

jobs:
  dependabot-auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Enable auto-merge
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            
            // Get the PR details
            const { data: pr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prNumber
            });
            
            // Check if auto-merge is already enabled
            if (pr.auto_merge_enabled) {
              console.log('Auto-merge already enabled for PR #' + prNumber);
              return;
            }
            
            // Enable auto-merge with squash method
            try {
              await github.rest.pulls.enableAutoMerge({
                owner,
                repo,
                pull_number: prNumber,
                merge_method: 'squash'
              });
              console.log('Auto-merge enabled successfully for PR #' + prNumber);
            } catch (error) {
              // Check if already enabled or other error
              if (error.message.includes('Auto-merge is already enabled')) {
                console.log('Auto-merge already enabled');
              } else if (error.message.includes('Required status check')) {
                console.log('Waiting for required status checks to pass...');
              } else {
                console.log('Error: ' + error.message);
              }
            }