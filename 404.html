<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - الصفحة غير موجودة | Weaver</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Tajawal',sans-serif;background:#050210;color:#e2d9f3;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;overflow:hidden;}
body.en{font-family:'Inter',sans-serif;direction:ltr;}
canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
.bg{position:fixed;inset:0;z-index:-1;background:radial-gradient(ellipse at 30% 40%,#1e0a3c 0%,transparent 60%),radial-gradient(ellipse at 70% 20%,#0c0a3e 0%,transparent 50%),#050210;}
.content{position:relative;z-index:1;padding:2rem;}
.err-num{font-size:clamp(6rem,20vw,12rem);font-weight:900;line-height:1;background:linear-gradient(135deg,#f0c060,#a855f7,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:1rem;}
.moon{font-size:clamp(3rem,8vw,5rem);margin-bottom:1rem;animation:float 3s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-15px);}}
h1{font-size:clamp(1.4rem,4vw,2rem);font-weight:900;color:#f0c060;margin-bottom:.75rem;}
p{color:rgba(226,217,243,.65);font-size:1.05rem;max-width:480px;margin:0 auto 2rem;line-height:1.7;}
.btns{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin-bottom:2.5rem;}
.btn-home{background:linear-gradient(135deg,#7c3aed,#ec4899);color:white;padding:.85rem 2rem;border-radius:50px;text-decoration:none;font-weight:700;font-size:.95rem;transition:opacity .2s;}
.btn-home:hover{opacity:.85;}
.btn-back{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.2);color:#e2d9f3;padding:.85rem 2rem;border-radius:50px;text-decoration:none;font-size:.95rem;transition:background .2s;cursor:pointer;font-family:inherit;}
.btn-back:hover{background:rgba(255,255,255,.13);}
.suggestions{display:flex;flex-wrap:wrap;gap:.75rem;justify-content:center;max-width:600px;}
.sug{background:rgba(124,58,237,.15);border:1px solid rgba(124,58,237,.35);color:#a855f7;padding:.4rem 1rem;border-radius:50px;text-decoration:none;font-size:.85rem;transition:all .2s;}
.sug:hover{background:rgba(124,58,237,.3);color:#f0c060;}
.lang-btns{position:fixed;top:1rem;left:1rem;display:flex;gap:6px;z-index:10;}
body.ar .lang-btns{left:auto;right:1rem;}
.lb{background:rgba(30,10,60,.8);color:#f0c060;border:1px solid rgba(124,58,237,.5);padding:.3rem .7rem;border-radius:50px;cursor:pointer;font-size:.78rem;font-weight:700;transition:all .2s;font-family:inherit;}
.lb.on,.lb:hover{background:#7c3aed;color:white;}
</style>
</head>
<body class="ar">
<div class="bg"></div>
<canvas id="cv"></canvas>
<div class="lang-btns">
  <button class="lb on" id="bar" onclick="setL('ar')">🇸🇦</button>
  <button class="lb" id="ben" onclick="setL('en')">🇬🇧</button>
</div>
<div class="content">
  <div class="moon">🌙</div>
  <div class="err-num">404</div>
  <h1 id="t1">هذا الحلم لم يُنسج بعد!</h1>
  <p id="t2">الصفحة التي تبحث عنها غير موجودة، ربما تبخّرت مثل حلم في الصباح. لكن لا تقلق — نرشدك للطريق الصحيح.</p>
  <div class="btns">
    <a href="/" class="btn-home" id="t3">🏠 العودة للرئيسية</a>
    <button class="btn-back" onclick="history.back()" id="t4">← الصفحة السابقة</button>
  </div>
  <div class="suggestions">
    <a href="/" class="sug" id="s1">الرئيسية</a>
    <a href="/ancient-egypt-dreams.html" class="sug" id="s2">مصر القديمة</a>
    <a href="/babylonian-dreams.html" class="sug" id="s3">بلاد الرافدين</a>
    <a href="/greek-dream-interpretation.html" class="sug" id="s4">اليونان</a>
    <a href="/islamic-dream-interpretation.html" class="sug" id="s5">التراث الإسلامي</a>
    <a href="/snake-dream.html" class="sug" id="s6">الثعبان</a>
    <a href="/flying-dream.html" class="sug" id="s7">الطيران</a>
    <a href="https://ai-dream-weaver.onrender.com/app/analyze" class="sug" id="s8">🔮 جرب المنصة</a>
  </div>
</div>
<script>
const cv=document.getElementById('cv');
const cx=cv.getContext('2d');
let stars=[];
function rsz(){cv.width=window.innerWidth;cv.height=window.innerHeight;}
function spawn(){stars=[];for(let i=0;i<160;i++)stars.push({x:Math.random()*cv.width,y:Math.random()*cv.height,r:Math.random()*1.5+.3,o:Math.random(),d:(Math.random()*.018+.004)*(Math.random()<.5?1:-1)});}
function draw(){cx.clearRect(0,0,cv.width,cv.height);stars.forEach(s=>{s.o+=s.d;if(s.o>1||s.o<0)s.d*=-1;cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);cx.fillStyle=`rgba(255,255,255,${s.o.toFixed(2)})`;cx.fill();});requestAnimationFrame(draw);}
window.addEventListener('resize',()=>{rsz();spawn();});rsz();spawn();draw();
const T={
ar:{t1:'هذا الحلم لم يُنسج بعد!',t2:'الصفحة التي تبحث عنها غير موجودة، ربما تبخّرت مثل حلم في الصباح. لكن لا تقلق — نرشدك للطريق الصحيح.',t3:'🏠 العودة للرئيسية',t4:'← الصفحة السابقة',s1:'الرئيسية',s2:'مصر القديمة',s3:'بلاد الرافدين',s4:'اليونان',s5:'التراث الإسلامي',s6:'الثعبان',s7:'الطيران',s8:'🔮 جرب المنصة'},
en:{t1:"This dream hasn't been woven yet!",t2:"The page you're looking for doesn't exist — perhaps it dissolved like a morning dream. Don't worry, we'll guide you back.",t3:'🏠 Back to Home',t4:'← Previous Page',s1:'Home',s2:'Ancient Egypt',s3:'Mesopotamia',s4:'Greece',s5:'Islamic Heritage',s6:'Snake Dream',s7:'Flying Dream',s8:'🔮 Try Platform'}
};
function setL(l){
  document.body.className=l;
  document.documentElement.setAttribute('lang',l);
  document.documentElement.setAttribute('dir',l==='ar'?'rtl':'ltr');
  document.getElementById('bar').classList.toggle('on',l==='ar');
  document.getElementById('ben').classList.toggle('on',l==='en');
  Object.keys(T[l]).forEach(id=>{const el=document.getElementById(id);if(el)el.innerHTML=T[l][id];});
  try{localStorage.setItem('weaver_lang',l);}catch(e){}
}
try{const s=localStorage.getItem('weaver_lang');if(s==='en')setL('en');}catch(e){}
</script>
</body>
</html>
