<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شكراً لشرائك - نَسَّاج الأحلام</title>
    <style>
        body {
            background: linear-gradient(135deg, #0a0f1e, #1a1f35);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            margin: 0;
        }
        .container {
            max-width: 600px;
            padding: 40px;
            background: rgba(255,255,255,0.05);
            border-radius: 30px;
            border: 2px solid #ffd700;
            box-shadow: 0 0 50px rgba(255,215,0,0.3);
        }
        h1 {
            color: #ffd700;
            font-size: 3em;
            margin-bottom: 20px;
        }
        p {
            margin: 20px 0;
            line-height: 1.8;
            font-size: 1.2em;
            color: #00ffff;
        }
        .timer {
            font-size: 2em;
            color: #ff00ff;
            margin: 30px 0;
        }
        .btn {
            display: inline-block;
            padding: 15px 40px;
            background: linear-gradient(45deg, #ffd700, #ff00ff);
            color: black;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2em;
            transition: transform 0.3s;
        }
        .btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ شكراً لثقتك!</h1>
        <p>تم تأكيد عملية الشراء بنجاح.<br>ستصلك تفاصيل الباقة على بريدك الإلكتروني خلال دقائق.</p>
        <div class="timer" id="timer">5</div>
        <p>سيتم تحويلك تلقائياً إلى المتجر خلال <span id="seconds">5</span> ثواني</p>
        <a href="https://ai-dream-weaver.vercel.app" class="btn">العودة إلى المتجر الآن</a>
    </div>

    <script>
        // عداد تنازلي
        let seconds = 5;
        const timerElement = document.getElementById('timer');
        const secondsElement = document.getElementById('seconds');
        
        const countdown = setInterval(() => {
            seconds--;
            timerElement.textContent = seconds;
            secondsElement.textContent = seconds;
            
            if (seconds <= 0) {
                clearInterval(countdown);
                window.location.href = 'https://ai-dream-weaver.vercel.app';
            }
        }, 1000);
    </script>
</body>
</html>
