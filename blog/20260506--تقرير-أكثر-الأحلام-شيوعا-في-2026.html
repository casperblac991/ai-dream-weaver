<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 تقرير: أكثر الأحلام شيوعاً في 2026 - Weaver</title>
    <meta name="description" content="📊 تقرير: أكثر الأحلام شيوعاً في 2026 - {category}">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: '{font}', sans-serif;
            background: #0a0514;
            color: #e2d9f3;
            line-height: 1.8;
            padding: 2rem;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 3rem; }
        h1 { color: #f0c060; font-size: 2.5rem; margin-bottom: 1rem; }
        .meta { display: flex; justify-content: center; gap: 2rem; color: #a855f7; margin-bottom: 1rem; flex-wrap: wrap; }
        .category { background: #7c3aed; color: white; padding: 0.3rem 1rem; border-radius: 50px; display: inline-block; margin-bottom: 1rem; }
        .content { background: rgba(30,10,60,0.3); padding: 2rem; border-radius: 20px; border: 1px solid #7c3aed; white-space: pre-line; }
        .content h2 { color: #f0c060; margin: 1.5rem 0 1rem; }
        .footer { text-align: center; margin-top: 3rem; padding-top: 2rem; border-top: 1px solid #7c3aed; }
        .bot-button { position: fixed; bottom: 20px; left: 20px; background: linear-gradient(135deg, #7c3aed, #ec4899); color: white; padding: 1rem 2rem; border-radius: 50px; text-decoration: none; font-weight: bold; z-index: 1000; }
        @media (max-width: 600px) { body { padding: 1rem; } h1 { font-size: 1.8rem; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span class="category">{category}</span>
            <h1>📊 تقرير: أكثر الأحلام شيوعاً في 2026</h1>
            <div class="meta">
                <span>📅 {date}</span>
                <span>⏱️ {read_time} min read</span>
                <span>🔖 {year}</span>
                <span>🆔 Article #{id}</span>
            </div>
        </div>
        <div class="content">
{content}
        </div>
        <div class="footer">
            <p>© {year} Weaver - AI Dream Interpretation Platform</p>
            <p>📚 Source: Weaver Cultural Encyclopedia | Updated: {updated}</p>
            <p>🤖 Telegram Bot: <a href="https://t.me/aidreamweaver_bot" style="color: #f0c060;">@aidreamweaver_bot</a></p>
            <p>🔗 <a href="https://aidreamweaver.store" style="color: #f0c060;">{back_label}</a></p>
        </div>
    </div>
    <a href="https://t.me/aidreamweaver_bot" class="bot-button" target="_blank">
        {bot_label}
    </a>
</body>
</html>
