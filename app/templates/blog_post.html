<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ post.title }} - {{ post.author }}</title>
    <meta name="description" content="{{ post.excerpt }}">
    <link rel="canonical" href="{{ request.url }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #00D4FF;
            --accent: #7C3AED;
            --bg: #050A0F;
            --bg-card: #0A1628;
            --text: #E8F4FD;
            --text-muted: #7A9BB5;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Cairo', sans-serif;
            line-height: 1.8;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }
        header {
            padding: 1rem 2rem;
            background: rgba(5,10,15,0.95);
            border-bottom: 1px solid rgba(0,212,255,0.2);
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--text);
            text-decoration: none;
        }
        .logo span { color: var(--primary); }
        article {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 2rem;
            margin: 2rem 0;
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .meta {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }
        .content {
            font-size: 1.1rem;
            line-height: 2;
        }
        .content h2 {
            margin: 1.5rem 0 1rem;
            color: var(--primary);
        }
        .content p { margin-bottom: 1rem; }
        .content ul, .content ol { margin-right: 1.5rem; margin-bottom: 1rem; }
        .back-link {
            display: inline-block;
            color: var(--primary);
            text-decoration: none;
            margin-top: 2rem;
        }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <header>
        <a href="/" class="logo">🌙 <span>نَسَّاج</span></a>
    </header>
    <main class="container">
        <article>
            <h1>{{ post.title }}</h1>
            <p class="meta">📅 {{ post.date }} | ✍️ {{ post.author }}</p>
            <div class="content">
                {{ post.content|safe }}
            </div>
        </article>
        <a href="/blog" class="back-link">← العودة للمقالات</a>
    </main>
</body>
</html>
