<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - نَسَّاج</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #00D4FF;
            --accent: #7C3AED;
            --bg: #050A0F;
            --bg-card: #0A1628;
            --text: #E8F4FD;
            --text-muted: #7A9BB5;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: var(--bg-card);
            padding: 2rem;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            margin: 1rem;
        }
        h1 {
            text-align: center;
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
        }
        h1 span { color: var(--primary); }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; color: var(--text-muted); }
        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(0,212,255,0.2);
            background: var(--bg);
            color: var(--text);
            font-family: inherit;
            font-size: 1rem;
        }
        input:focus {
            outline: none;
            border-color: var(--primary);
        }
        button {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
            transition: transform 0.2s;
        }
        button:hover { transform: translateY(-2px); }
        button:disabled { opacity: 0.7; cursor: not-allowed; }
        .error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid #ef4444;
            color: #fca5a5;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
        }
        .links {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-muted);
        }
        .links a { color: var(--primary); text-decoration: none; }
        .logo {
            text-align: center;
            margin-bottom: 2rem;
            font-size: 2rem;
            font-weight: 700;
        }
        .logo span { color: var(--primary); }
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
            margin-left: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🌙 <span>نَسَّاج</span></div>
        <h1>تسجيل <span>الدخول</span></h1>
        
        <div id="error" class="error"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label>البريد الإلكتروني</label>
                <input type="email" id="email" required placeholder="أدخل بريدك الإلكتروني">
            </div>
            <div class="form-group">
                <label>كلمة المرور</label>
                <input type="password" id="password" required placeholder="أدخل كلمة المرور">
            </div>
            <button type="submit" id="submitBtn">
                <span id="btnText">تسجيل الدخول</span>
            </button>
        </form>
        
        <div class="links">
            ليس لديك حساب؟ <a href="/app/register">إنشاء حساب</a>
        </div>
    </div>
    
    <script>
        const form = document.getElementById('loginForm');
        const errorEl = document.getElementById('error');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorEl.style.display = 'none';
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                showError('الرجاء إدخال البريد الإلكتروني وكلمة المرور');
                return;
            }
            
            submitBtn.disabled = true;
            btnText.innerHTML = '<span class="spinner"></span> جاري تسجيل الدخول...';
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem('user_id', data.user_id);
                    localStorage.setItem('username', data.username);
                    window.location.href = '/app/dashboard';
                } else {
                    showError(data.error || 'حدث خطأ في تسجيل الدخول');
                }
            } catch (err) {
                showError('خطأ في الاتصال حاول مرة أخرى');
            } finally {
                submitBtn.disabled = false;
                btnText.textContent = 'تسجيل الدخول';
            }
        });
        
        function showError(message) {
            errorEl.textContent = message;
            errorEl.style.display = 'block';
        }
        
        // Check if already logged in
        if (localStorage.getItem('user_id')) {
            window.location.href = '/app/dashboard';
        }
    </script>
</body>
</html>
