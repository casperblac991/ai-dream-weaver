<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - Weaver 🌙</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1a0033 0%, #2d0052 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            min-height: 100vh;
        }
        
        .navbar {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .navbar h1 {
            font-size: 24px;
            background: linear-gradient(135deg, #a78bfa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .navbar-actions {
            display: flex;
            gap: 15px;
        }
        
        .navbar-actions button {
            padding: 10px 20px;
            background: rgba(167, 139, 250, 0.2);
            border: 1px solid rgba(167, 139, 250, 0.5);
            border-radius: 8px;
            color: #a78bfa;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .navbar-actions button:hover {
            background: rgba(167, 139, 250, 0.3);
            border-color: #a78bfa;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        .welcome-section {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 40px;
            text-align: center;
        }
        
        .welcome-section h2 {
            font-size: 32px;
            margin-bottom: 15px;
            color: #a78bfa;
        }
        
        .dream-input-section {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 40px;
        }
        
        .dream-input-section h3 {
            font-size: 20px;
            margin-bottom: 20px;
            color: #a78bfa;
        }
        
        .input-group {
            display: flex;
            gap: 10px;
        }
        
        .input-group textarea {
            flex: 1;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: white;
            font-size: 14px;
            resize: vertical;
            min-height: 100px;
        }
        
        .input-group button {
            padding: 15px 30px;
            background: linear-gradient(135deg, #a78bfa, #c084fc);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .input-group button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(167, 139, 250, 0.4);
        }
        
        .dreams-history {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 30px;
        }
        
        .dreams-history h3 {
            font-size: 20px;
            margin-bottom: 20px;
            color: #a78bfa;
        }
        
        .dream-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
        }
        
        .dream-card h4 {
            color: #a78bfa;
            margin-bottom: 10px;
        }
        
        .dream-card p {
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.6;
            margin-bottom: 10px;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>🌙 Weaver</h1>
        <div class="navbar-actions">
            <button onclick="window.location.href='/blog'">📖 المدونة</button>
            <button onclick="logout()">🚪 تسجيل الخروج</button>
        </div>
    </div>
    
    <div class="container">
        <div class="welcome-section">
            <h2>مرحباً بك في Weaver 🌙</h2>
            <p>فسّر أحلامك بالذكاء الاصطناعي واكتشف معانيها العميقة</p>
        </div>
        
        <div class="dream-input-section">
            <h3>📝 أدخل حلمك</h3>
            <form method="post" action="/api/interpret-dream">
                <div class="input-group">
                    <textarea name="dream_description" placeholder="اكتب وصف حلمك هنا..." required></textarea>
                    <button type="submit">تفسير الحلم ✨</button>
                </div>
            </form>
        </div>
        
        <div class="dreams-history">
            <h3>📚 سجل أحلامك</h3>
            <div class="empty-state">
                <p>لم تفسّر أي أحلام بعد. ابدأ الآن! 🌙</p>
            </div>
        </div>
    </div>
    
    <script>
        function logout() {
            fetch('/api/logout', { method: 'POST' })
                .then(() => {
                    window.location.href = '/app/login';
                });
        }
    </script>
</body>
</html>
