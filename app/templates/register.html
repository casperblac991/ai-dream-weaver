<!DOCTYPE html>
<html>
<head>
    <title>تسجيل</title>
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #0a0715; color: #fff; text-align: center; padding: 2rem; }
        input, button { padding: 0.5rem; margin: 0.5rem; border-radius: 8px; border: none; }
        button { background: #8b5cf6; color: #fff; cursor: pointer; }
    </style>
</head>
<body>
    <h1>تسجيل حساب جديد</h1>
    <form method="post">
        <input name="username" placeholder="اسم المستخدم" required><br>
        <input name="email" type="email" placeholder="البريد الإلكتروني" required><br>
        <input name="password" type="password" placeholder="كلمة المرور" required><br>
        <button type="submit">تسجيل</button>
    </form>
    {% if error %} <p style="color:red">{{ error }}</p> {% endif %}
    <a href="/app/login">لديك حساب؟ سجل دخول</a>
</body>
</html>
