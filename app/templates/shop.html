<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="متجر نَسَّاج - منتجات تفسير الأحلام بالذكاء الاصطناعي">
    <meta name="keywords" content="متجر, أحلام, تفسير, AI, منتجات رقمية">
    <title>متجر نَسَّاج - المتجر الرسمي</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 100%);
            color: #e2d9f3;
            line-height: 1.6;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        /* Header */
        header {
            background: rgba(10, 10, 26, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #7c3aed;
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        .logo { font-size: 1.8rem; font-weight: bold; color: #f0c060; }
        .nav-links { display: flex; gap: 30px; }
        .nav-links a { color: #e2d9f3; text-decoration: none; transition: color 0.3s; }
        .nav-links a:hover { color: #f0c060; }
        .cart-icon {
            position: relative;
            cursor: pointer;
            font-size: 1.5rem;
            color: #f0c060;
        }
        .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #ff6b6b;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: bold;
        }
        
        /* Hero Section */
        .hero {
            text-align: center;
            padding: 60px 20px;
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.1) 0%, rgba(240, 192, 96, 0.05) 100%);
            border-radius: 20px;
            margin-bottom: 60px;
        }
        .hero h1 {
            font-size: 3rem;
            color: #f0c060;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(240, 192, 96, 0.3);
        }
        .hero p {
            font-size: 1.2rem;
            color: #a855f7;
            margin-bottom: 30px;
        }
        
        /* Filter Section */
        .filters {
            display: flex;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .filter-btn {
            padding: 10px 20px;
            border: 2px solid #7c3aed;
            background: transparent;
            color: #e2d9f3;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.95rem;
        }
        .filter-btn:hover,
        .filter-btn.active {
            background: #7c3aed;
            color: white;
            transform: translateY(-2px);
        }
        
        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 60px;
        }
        .product-card {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border: 1px solid #7c3aed;
            border-radius: 15px;
            overflow: hidden;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
        }
        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(124, 58, 237, 0.3);
            border-color: #f0c060;
        }
        .product-image {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }
        .product-info {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .product-category {
            color: #f0c060;
            font-size: 0.85rem;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .product-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: #e2d9f3;
            margin-bottom: 10px;
        }
        .product-description {
            color: #a855f7;
            font-size: 0.9rem;
            margin-bottom: 15px;
            flex: 1;
        }
        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid #7c3aed;
        }
        .product-price {
            font-size: 1.5rem;
            font-weight: bold;
            color: #f0c060;
        }
        .add-to-cart-btn {
            padding: 8px 16px;
            background: #7c3aed;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        .add-to-cart-btn:hover {
            background: #a855f7;
            transform: scale(1.05);
        }
        
        /* Cart Modal */
        .cart-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .cart-modal.active { display: flex; }
        .cart-content {
            background: #1a1a2e;
            border: 2px solid #7c3aed;
            border-radius: 15px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #7c3aed;
            padding-bottom: 15px;
        }
        .cart-header h2 { color: #f0c060; }
        .close-cart {
            background: none;
            border: none;
            color: #e2d9f3;
            font-size: 1.5rem;
            cursor: pointer;
        }
        .cart-items { margin-bottom: 20px; }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #7c3aed;
        }
        .cart-item-name { color: #e2d9f3; }
        .cart-item-price { color: #f0c060; font-weight: bold; }
        .remove-item {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
        }
        .cart-total {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            font-weight: bold;
            color: #f0c060;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(124, 58, 237, 0.2);
            border-radius: 10px;
        }
        .checkout-btn {
            width: 100%;
            padding: 15px;
            background: #7c3aed;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .checkout-btn:hover {
            background: #a855f7;
            transform: scale(1.02);
        }
        
        /* Footer */
        footer {
            background: rgba(10, 10, 26, 0.8);
            border-top: 1px solid #7c3aed;
            padding: 40px 20px;
            text-align: center;
            color: #a855f7;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .hero h1 { font-size: 2rem; }
            .products-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
            .nav-links { gap: 15px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <div class="header-content">
            <div class="logo">🌙 نَسَّاج</div>
            <nav class="nav-links">
                <a href="/">الرئيسية</a>
                <a href="/blog">المدونة</a>
                <a href="/shop">المتجر</a>
                <a href="/login">دخول</a>
            </nav>
            <div class="cart-icon" onclick="toggleCart()">
                🛒
                <span class="cart-count" id="cartCount">0</span>
            </div>
        </div>
    </header>

    <!-- Hero Section -->
    <div class="container">
        <div class="hero">
            <h1>🛍️ متجر نَسَّاج</h1>
            <p>منتجات رقمية حصرية لتفسير أحلامك بالذكاء الاصطناعي</p>
        </div>

        <!-- Filters -->
        <div class="filters">
            <button class="filter-btn active" onclick="filterProducts('all')">جميع المنتجات</button>
            <button class="filter-btn" onclick="filterProducts('premium')">🌟 باقات بريميوم</button>
            <button class="filter-btn" onclick="filterProducts('courses')">📚 دورات تعليمية</button>
            <button class="filter-btn" onclick="filterProducts('tools')">🔧 أدوات متقدمة</button>
        </div>

        <!-- Products Grid -->
        <div class="products-grid" id="productsGrid">
            <!-- Products will be loaded here by JavaScript -->
        </div>
    </div>

    <!-- Cart Modal -->
    <div class="cart-modal" id="cartModal">
        <div class="cart-content">
            <div class="cart-header">
                <h2>🛒 سلة التسوق</h2>
                <button class="close-cart" onclick="toggleCart()">✕</button>
            </div>
            <div class="cart-items" id="cartItems">
                <!-- Cart items will be displayed here -->
            </div>
            <div class="cart-total">
                <span>الإجمالي:</span>
                <span id="cartTotal">0 ر.س</span>
            </div>
            <button class="checkout-btn" onclick="checkout()">متابعة الدفع 💳</button>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <p>© 2026 نَسَّاج - منصة تفسير الأحلام بالذكاء الاصطناعي</p>
        <p>جميع الحقوق محفوظة | <a href="/privacy" style="color: #f0c060;">سياسة الخصوصية</a></p>
    </footer>

    <script>
        // Products Data
        const products = [
            {
                id: 1,
                name: "تفسير حلم واحد",
                category: "basic",
                price: 9.99,
                emoji: "🔮",
                description: "تفسير شامل لحلم واحد مع شرح مفصل"
            },
            {
                id: 2,
                name: "باقة 10 أحلام",
                category: "premium",
                price: 49.99,
                emoji: "✨",
                description: "تفسير 10 أحلام مع تحليل نفسي عميق"
            },
            {
                id: 3,
                name: "تقرير الأحلام الأسبوعي",
                category: "premium",
                price: 29.99,
                emoji: "📊",
                description: "تقرير شامل لأحلام الأسبوع مع رسوم بيانية"
            },
            {
                id: 4,
                name: "دورة تفسير الأحلام الإسلامي",
                category: "courses",
                price: 79.99,
                emoji: "📚",
                description: "دورة متكاملة في تفسير الأحلام وفقاً للتراث الإسلامي"
            },
            {
                id: 5,
                name: "دورة علم النفس والأحلام",
                category: "courses",
                price: 69.99,
                emoji: "🧠",
                description: "فهم الأحلام من منظور علم النفس الحديث"
            },
            {
                id: 6,
                name: "أداة تحليل الأحلام المتقدمة",
                category: "tools",
                price: 99.99,
                emoji: "🔧",
                description: "أداة متقدمة لتحليل الأحلام مع ميزات AI"
            },
            {
                id: 7,
                name: "قاموس الرموز الحلمية",
                category: "tools",
                price: 39.99,
                emoji: "📖",
                description: "قاموس شامل لتفسير الرموز والدلالات"
            },
            {
                id: 8,
                name: "اشتراك سنوي بريميوم",
                category: "premium",
                price: 199.99,
                emoji: "👑",
                description: "وصول غير محدود لجميع الخدمات والمميزات"
            }
        ];

        let cart = [];
        let currentFilter = 'all';

        function renderProducts(filter = 'all') {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = '';
            
            const filtered = filter === 'all' ? products : products.filter(p => p.category === filter);
            
            filtered.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <div class="product-image">${product.emoji}</div>
                    <div class="product-info">
                        <div class="product-category">${getCategoryName(product.category)}</div>
                        <div class="product-name">${product.name}</div>
                        <div class="product-description">${product.description}</div>
                        <div class="product-footer">
                            <div class="product-price">${product.price} ر.س</div>
                            <button class="add-to-cart-btn" onclick="addToCart(${product.id})">أضف</button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function getCategoryName(category) {
            const names = {
                'basic': '🔹 أساسي',
                'premium': '🌟 بريميوم',
                'courses': '📚 دورات',
                'tools': '🔧 أدوات'
            };
            return names[category] || category;
        }

        function filterProducts(category) {
            currentFilter = category;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderProducts(category);
        }

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const existingItem = cart.find(item => item.id === productId);
            
            if (existingItem) {
                existingItem.quantity++;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            
            updateCart();
            showNotification(`✅ تم إضافة ${product.name} إلى السلة`);
        }

        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            updateCart();
        }

        function updateCart() {
            document.getElementById('cartCount').textContent = cart.length;
            renderCartItems();
        }

        function renderCartItems() {
            const cartItems = document.getElementById('cartItems');
            cartItems.innerHTML = '';
            
            if (cart.length === 0) {
                cartItems.innerHTML = '<p style="text-align: center; color: #a855f7;">السلة فارغة</p>';
                return;
            }
            
            cart.forEach(item => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'cart-item';
                itemDiv.innerHTML = `
                    <span class="cart-item-name">${item.name} × ${item.quantity}</span>
                    <span class="cart-item-price">${(item.price * item.quantity).toFixed(2)} ر.س</span>
                    <button class="remove-item" onclick="removeFromCart(${item.id})">حذف</button>
                `;
                cartItems.appendChild(itemDiv);
            });
            
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            document.getElementById('cartTotal').textContent = total.toFixed(2) + ' ر.س';
        }

        function toggleCart() {
            document.getElementById('cartModal').classList.toggle('active');
        }

        function checkout() {
            if (cart.length === 0) {
                showNotification('⚠️ السلة فارغة');
                return;
            }
            
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            alert(`سيتم توجيهك لصفحة الدفع\nالإجمالي: ${total.toFixed(2)} ر.س`);
            // In production, redirect to payment gateway
            // window.location.href = '/checkout';
        }

        function showNotification(message) {
            const notif = document.createElement('div');
            notif.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: #7c3aed;
                color: white;
                padding: 15px 20px;
                border-radius: 10px;
                z-index: 2000;
                animation: slideIn 0.3s ease-out;
            `;
            notif.textContent = message;
            document.body.appendChild(notif);
            
            setTimeout(() => notif.remove(), 3000);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderProducts();
        });
    </script>
</body>
</html>
