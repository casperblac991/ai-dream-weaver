<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>تفسير الأحلام</title>
    <script src="https://cdn.jsdelivr.net/npm/@upstreet-labs/puter-js@2.6.4/dist/puter.min.js"></script>
    <style>
        body { background: #0a0a1a; color: #fff; font-family: system-ui; text-align: center; padding: 20px; }
        textarea { width: 90%; max-width: 500px; background: #1a1a2e; color: white; border: 1px solid #a855f7; padding: 15px; margin: 10px; border-radius: 10px; }
        button { background: #7c3aed; color: white; padding: 12px 40px; border: none; border-radius: 50px; font-size: 18px; cursor: pointer; }
        #result { background: #1a1a2e; padding: 20px; margin: 20px auto; width: 90%; max-width: 500px; border-radius: 10px; text-align: right; }
    </style>
</head>
<body>
    <h1>🧠 Weaver AI</h1>
    <textarea id="dream" rows="5" placeholder="اكتب حلمك هنا..."></textarea><br>
    <button onclick="interpret()">🔮 فسر حلمي</button>
    <div id="result">التفسير يظهر هنا...</div>

    <script>
        async function interpret() {
            const dream = document.getElementById('dream').value;
            const resultDiv = document.getElementById('result');
            
            if (!dream) {
                resultDiv.innerText = '❌ اكتب الحلم أولاً';
                return;
            }
            
            resultDiv.innerText = '🔮 جاري التفسير...';
            
            try {
                const ai = puter.ai.chat;
                const response = await ai(
                    `فسر هذا الحلم بالعربية:\n${dream}\n\nاكتب تفسير منظم: المعنى العام، الرموز المهمة، نصيحة.`
                );
                resultDiv.innerText = response;
            } catch (e) {
                resultDiv.innerText = '❌ خطأ، حاول مرة أخرى';
            }
        }
    </script>
</body>
</html>
