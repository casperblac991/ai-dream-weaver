<!DOCTYPE html>
<html>

<head>

<title>Dashboard - Dreamora AI</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:40px;
}

.container{
max-width:800px;
margin:auto;
}

textarea{
width:100%;
height:120px;
padding:10px;
border-radius:8px;
border:none;
}

button{
margin-top:10px;
padding:10px 20px;
border:none;
border-radius:8px;
background:#6366f1;
color:white;
cursor:pointer;
}

.result{
margin-top:30px;
background:#1e293b;
padding:20px;
border-radius:12px;
}

</style>

</head>

<body>

<div class="container">

<h1>🧠 Dream Analyzer</h1>

<textarea id="dreamText" placeholder="Write your dream here..."></textarea>

<br>

<label>
<input type="checkbox" id="publicDream">
Publish dream to Dream Feed
</label>

<br>

<button onclick="analyzeDream()">Analyze Dream</button>

<div id="result" class="result"></div>

</div>

<script>

let user_id = localStorage.getItem("user_id")

async function analyzeDream(){

let dream=document.getElementById("dreamText").value
let publicDream=document.getElementById("publicDream").checked ? 1 : 0

let response=await fetch("/api/analyze-dream",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
user_id:user_id,
dream:dream,
public:publicDream
})

})

let data=await response.json()

document.getElementById("result").innerHTML=`

<h3>Dream</h3>
${data.dream}

<br><br>

<h3>AI Interpretation</h3>
${data.interpretation}

`

}

</script>

</body>
</html>
