<!DOCTYPE html>
<html>

<head>

<title>AI Dream Weaver</title>

<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

.container{
max-width:600px;
margin:auto;
}

textarea{
width:100%;
height:120px;
padding:10px;
font-size:16px;
border-radius:8px;
border:none;
}

button{
margin-top:10px;
padding:12px 20px;
font-size:16px;
background:#3b82f6;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

.result{
margin-top:30px;
background:#1e293b;
padding:20px;
border-radius:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>AI Dream Weaver</h1>

<p>Describe your dream and get an AI interpretation</p>

<textarea id="dreamInput" placeholder="Write your dream here..."></textarea>

<br>

<button onclick="analyzeDream()">Analyze Dream</button>

<br><br>

<a href="/history">
<button>View Dream History</button>
</a>

<div class="result" id="resultBox"></div>

</div>

<script>

async function analyzeDream(){

let dream = document.getElementById("dreamInput").value

let response = await fetch("/api/analyze-dream",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({dream:dream})
})

let data = await response.json()

document.getElementById("resultBox").innerHTML =
"<b>Interpretation:</b><br>"+data.interpretation

}

</script>

</body>
</html>
