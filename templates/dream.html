
<!DOCTYPE html>
<html>
<head>
<title>AI Dream Analyzer</title>
</head>

<body>

<h2>AI Dream Weaver</h2>

<textarea id="dream" placeholder="Write your dream here..." rows="6" cols="50"></textarea>

<br><br>

<button onclick="analyzeDream()">Analyze Dream</button>

<h3>Interpretation:</h3>

<div id="result"></div>

<script>

async function analyzeDream(){

let dreamText = document.getElementById("dream").value;

let response = await fetch("/api/analyze-dream",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({dream:dreamText})
});

let data = await response.json();

document.getElementById("result").innerText = data.interpretation;

}

</script>

</body>
</html>
