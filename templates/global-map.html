<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خارطة الأحلام العالمية | نَسَّاج</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #020617;
            --card: #1e293b;
        }
        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg);
            color: white;
            margin: 0;
            overflow-x: hidden;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        h1 {
            text-align: center;
            font-size: 3rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 40px;
        }
        .map-placeholder {
            width: 100%;
            height: 500px;
            background: rgba(255,255,255,0.05);
            border-radius: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid var(--primary);
            position: relative;
            margin-bottom: 50px;
        }
        .map-placeholder::after {
            content: "🌍 خارطة الأحلام التفاعلية قيد التحديث...";
            font-size: 1.5rem;
            color: var(--primary);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .stat-card {
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .stat-card h3 {
            color: #818cf8;
            margin-bottom: 10px;
        }
        .stat-card .number {
            font-size: 2.5rem;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌍 خارطة الأحلام العالمية (Live)</h1>
        <p style="text-align: center; color: #94a3b8;">شاهد ماذا يحلم العالم الآن. اتجاهات الأحلام المباشرة من 150 دولة.</p>
        
        <div class="map-placeholder"></div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>أكثر الرموز بحثاً اليوم</h3>
                <div class="number">🐍 الثعابين</div>
                <p>ارتفاع بنسبة 15% في الشرق الأوسط</p>
            </div>
            <div class="stat-card">
                <h3>أكثر الدول نشاطاً</h3>
                <div class="number">🇪🇬 مصر</div>
                <p>تليها الولايات المتحدة والهند</p>
            </div>
            <div class="stat-card">
                <h3>الحالة المزاجية للأحلام</h3>
                <div class="number">✨ إيجابية</div>
                <p>بناءً على تحليل 10,000 حلم اليوم</p>
            </div>
        </div>
    </div>
</body>
</html>
