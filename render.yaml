services:
  - type: web
    name: ai-dream-weaver-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python all_bots.py
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: UNSPLASH_ACCESS_KEY
        sync: false
      - key: STORE_URL
        value: https://aidreamweaver.store
