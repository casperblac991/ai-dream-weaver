services:
  - type: web
    name: ai-dream-weaver-bot
    runtime: python
    region: singapore
    plan: free
    pythonVersion: 3.11.0
    buildCommand: |
      apt-get update
      apt-get install -y python3-dev build-essential libjpeg-dev zlib1g-dev
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: python all_bots.py
    healthCheckPath: /healthcheck
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: UNSPLASH_ACCESS_KEY
        sync: false
      - key: STORE_URL
        value: https://aidreamweaver.store
      - key: PYTHONUNBUFFERED
        value: true
